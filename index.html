<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>☆ 彡 珏然 // 田野 ♪ ★</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000003; overflow: hidden; font-family: 'Hiragino Mincho ProN', serif; cursor: none; }
        #webgl-canvas { position: fixed; inset: 0; z-index: 1; filter: contrast(120%) saturate(130%); }
        .ui { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 60px; text-align: center; }
        .title { color: #fff; font-weight: 900; font-style: italic; font-size: 1.8rem; letter-spacing: 0.3em; text-shadow: 0 0 40px rgba(180,100,255,1.0); }
        #cursor { width: 4px; height: 4px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; transform: translate(-50%, -50%); mix-blend-mode: difference; }
    </style>
</head>
<body class="bg-black">
    <div id="cursor"></div>
    <canvas id="webgl-canvas"></canvas>
    <div class="ui">
        <div>
            <h1 class="title uppercase">☆ 彡 珏然 // 田野 ♪ ★</h1>
            <p class="text-[9px] tracking-[1.8em] text-white/30 mt-6 uppercase">ID: u // 724Hz // 44271_SYNC</p>
        </div>
        <div class="text-[8px] opacity-10 tracking-widest text-white">REality_HijaCK_COMPLETE</div>
    </div>

    <script id="vShader" type="x-shader/x-vertex">
        uniform float uTime;
        uniform float uMorph;
        uniform vec2 uMouse;
        varying vec3 vCol;
        varying float vA;

        void main() {
            vec3 p = position;
            float r = length(p.xy);
            
            // 724Hz 对数螺旋算法：采样 space.jpg 的物理结构
            float t724 = uTime * 0.724;
            float angle = r * 0.01 + t724 * 3.0;
            vec3 spiral = vec3(
                cos(angle) * p.x - sin(angle) * p.y,
                sin(angle) * p.x + cos(angle) * p.y,
                p.z + sin(r * 0.03 + t724 * 5.0) * 200.0
            );

            p = mix(position, spiral, 0.9);

            // 鼠标引力坍缩
            float dM = distance(p.xy, uMouse * 800.0);
            float pull = (1.0 / (dM * 0.012 + 1.0)) * uMorph;
            p.xy = mix(p.xy, uMouse * 800.0, pull * 0.2);

            // 颜色：锁定 space.jpg 的紫色与金色
            vCol = mix(color, vec3(0.1, 0.9, 1.0), pull); // 坍缩时迸发青色
            vA = (0.4 + pull * 0.6) * (1.1 - r / 2600.0);

            vec4 mvp = modelViewMatrix * vec4(p, 1.0);
            // 物理防方块：强制缩放锁定
            gl_PointSize = clamp(4.5 * (1100.0 / -mvp.z), 1.5, 9.0);
            gl_Position = projectionMatrix * mvp;
        }
    </script>

    <script id="fShader" type="x-shader/x-fragment">
        varying vec3 vCol;
        varying float vA;
        void main() {
            float d = length(gl_PointCoord - 0.5);
            if (d > 0.5) discard; 
            float glow = pow(1.0 - d * 2.0, 2.5);
            gl_FragColor = vec4(vCol, vA * glow);
        }
    </script>

    <script>
        let scene, camera, renderer, points, mTarget=0, curMorph=0;
        const clock = new THREE.Clock(), mouse = new THREE.Vector2();
        const COUNT = 72471; 

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 1, 5000);
            camera.position.z = 1400;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('webgl-canvas'), antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(1.0); 

            const geo = new THREE.BufferGeometry();
            const pos = new Float32Array(COUNT * 3), col = new Float32Array(COUNT * 3);
            
            for(let i=0; i<COUNT; i++) {
                // 模拟 space.jpg 的油画分布
                let r = Math.pow(Math.random(), 0.55) * 2200;
                let theta = Math.random() * Math.PI * 2;
                pos[i*3] = Math.cos(theta) * r; pos[i*3+1] = Math.sin(theta) * r; pos[i*3+2] = (Math.random()-0.5)*400;
                
                // 锁定紫色色域
                col[i*3] = 0.4 + Math.random() * 0.4; // 紫
                col[i*3+1] = 0.2; 
                col[i*3+2] = 0.9 + Math.random() * 0.1;
            }
            geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
            geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

            const mat = new THREE.ShaderMaterial({
                uniforms: { uTime:{value:0}, uMorph:{value:0}, uMouse:{value:new THREE.Vector2()} },
                vertexShader: document.getElementById('vShader').textContent,
                fragmentShader: document.getElementById('fShader').textContent,
                transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
            });

            points = new THREE.Points(geo, mat);
            scene.add(points);

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                document.getElementById('cursor').style.left = e.clientX + 'px';
                document.getElementById('cursor').style.top = e.clientY + 'px';
            });
            window.addEventListener('mousedown', () => mTarget = 1);
            window.addEventListener('mouseup', () => mTarget = 0);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            curMorph += (mTarget - curMorph) * 0.05;
            points.material.uniforms.uTime.value = t;
            points.material.uniforms.uMorph.value = curMorph;
            points.material.uniforms.uMouse.value.lerp(mouse, 0.1);
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
