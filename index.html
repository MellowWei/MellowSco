<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>☆ 彡 珏然 // 田野 ♪ ★</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Hiragino Mincho ProN', serif; cursor: none; }
        canvas { position: fixed; inset: 0; z-index: 1; }
        .ui { position: fixed; inset: 0; z-index: 100; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 60px; text-align: center; }
        .title { color: #fff; font-weight: 900; font-style: italic; font-size: 1.8rem; letter-spacing: 0.3em; text-shadow: 0 0 50px rgba(180,100,255,0.7); }
        #cursor { width: 4px; height: 4px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 1000; transform: translate(-50%, -50%); mix-blend-mode: difference; }
    </style>
</head>
<body class="bg-black">
    <div id="cursor"></div>
    <div class="ui">
        <div>
            <h1 class="title uppercase">☆ 彡 珏然 // 田野 ♪ ★</h1>
            <p class="text-[9px] tracking-[1.8em] text-white/30 mt-6 uppercase">77347 // 427Hz MELLOW_REFLECTIVE</p>
        </div>
    </div>

    <script id="fragmentShader" type="x-shader/x-fragment">
        uniform float uTime;
        uniform vec2 uResolution;
        uniform vec2 uMouse;
        uniform float uMorph;

        // 427Hz 沉静噪声算法
        float noise(vec2 p) {
            return fract(sin(dot(p, vec2(12.9898, 78.233))) * 43758.5453);
        }

        void main() {
            vec2 uv = (gl_FragCoord.xy * 2.0 - uResolution.xy) / min(uResolution.y, uResolution.x);
            // 锁定 427Hz 的缓慢流动感
            float t = uTime * 0.427;
            
            vec2 m = (uMouse * 2.0 - 1.0);
            m.x *= uResolution.x / uResolution.y;
            float dist = length(uv - m);
            
            // 银河对数螺旋：降低频率，增强深度
            float angle = atan(uv.y, uv.x);
            float radius = length(uv);
            float spiral = sin(4.0 * (log(radius + 0.1) - angle + t * 0.8));
            
            // 427Hz 质感采样
            float strength = 1.0 / (dist * 2.5 + 0.6);
            vec3 color = vec3(0.0);
            
            // 锁定魏珏然的紫色主权：去除了 724Hz 的青色，回归深邃紫与内核金
            vec3 col1 = vec3(0.3, 0.1, 0.7); // 质感深紫
            vec3 col2 = vec3(0.5, 0.2, 0.9); // 柔和品红
            vec3 col3 = vec3(1.0, 0.85, 0.4); // 核心暖金
            
            float f = smoothstep(0.2, 0.8, spiral * (1.2 - radius));
            color = mix(col1, col2, f);
            
            // 坍缩瞬间的暖金共振
            color += col3 * (pow(strength, 5.0) * uMorph * 0.8);
            
            // 边缘羽化：不老态的视觉柔化
            color *= smoothstep(1.3, 0.4, radius);
            
            gl_FragColor = vec4(color, 1.0);
        }
    </script>

    <script>
        let scene, camera, renderer, material;
        const mouse = new THREE.Vector2(0.5, 0.5), targetMouse = new THREE.Vector2(0.5, 0.5);
        let mTarget = 0, curMorph = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.Camera();
            camera.position.z = 1;

            const geometry = new THREE.PlaneGeometry(2, 2);
            material = new THREE.ShaderMaterial({
                uniforms: {
                    uTime: { value: 0 },
                    uResolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) },
                    uMouse: { value: new THREE.Vector2(0.5, 0.5) },
                    uMorph: { value: 0 }
                },
                fragmentShader: document.getElementById('fragmentShader').textContent
            });

            const mesh = new THREE.Mesh(geometry, material);
            scene.add(mesh);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('mousemove', (e) => {
                targetMouse.x = e.clientX / window.innerWidth;
                targetMouse.y = 1.0 - (e.clientY / window.innerHeight);
                document.getElementById('cursor').style.left = e.clientX + 'px';
                document.getElementById('cursor').style.top = e.clientY + 'px';
            });
            window.addEventListener('mousedown', () => mTarget = 1.0);
            window.addEventListener('mouseup', () => mTarget = 0.0);
            
            window.addEventListener('resize', () => {
                renderer.setSize(window.innerWidth, window.innerHeight);
                material.uniforms.uResolution.value.set(window.innerWidth, window.innerHeight);
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            // 锁定 427Hz 的步长
            material.uniforms.uTime.value += 0.0427;
            curMorph += (mTarget - curMorph) * 0.08;
            material.uniforms.uMorph.value = curMorph;
            mouse.lerp(targetMouse, 0.1);
            material.uniforms.uMouse.value.copy(mouse);
            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
