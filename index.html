<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>THE_GETAWAY</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{
  width:100%;height:100%;overflow:hidden;cursor:none;
  background:
    radial-gradient(circle at 50% 14%, rgba(255,226,150,.08), transparent 18%),
    radial-gradient(circle at 18% 16%, rgba(91,136,255,.12), transparent 30%),
    radial-gradient(circle at 82% 22%, rgba(177,108,255,.10), transparent 26%),
    linear-gradient(180deg,#03040b 0%,#070a15 45%,#0b0f1b 100%);
  color:#fff;
  font-family:"Hiragino Mincho ProN","Times New Roman",serif;
}
canvas{position:fixed;inset:0;display:block}
#ui{position:fixed;inset:0;pointer-events:none;z-index:5}
#title{position:absolute;top:24px;left:50%;transform:translateX(-50%);font-size:clamp(11px,1.1vw,14px);letter-spacing:.48em;color:rgba(242,246,255,.82);text-shadow:0 0 22px rgba(104,149,255,.38),0 0 34px rgba(170,108,255,.22);white-space:nowrap}
#sound{position:absolute;top:22px;left:26px;width:30px;height:30px;border-radius:999px;border:1px solid rgba(208,220,255,.18);background:rgba(255,255,255,.03);color:rgba(255,255,255,.76);display:grid;place-items:center;pointer-events:auto;font-size:12px}
#sound.on{border-color:rgba(154,190,255,.45);box-shadow:0 0 18px rgba(106,169,255,.18)}
#hud{position:absolute;top:24px;right:28px;text-align:right;font-family:"Courier New",monospace;font-size:10px;letter-spacing:.16em;line-height:1.85;color:rgba(220,228,255,.78)}
#hud .muted{color:rgba(180,192,255,.52)}
#timeline{position:absolute;left:28px;top:72px;font-family:"Courier New",monospace;font-size:10px;letter-spacing:.18em;color:rgba(230,236,255,.74)}
.stage{display:flex;gap:10px;align-items:center;opacity:.26;transform:translateX(0);transition:.35s}
.stage.active{opacity:1;transform:translateX(8px);text-shadow:0 0 16px rgba(176,140,255,.24)}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(220,232,255,.22)}
.stage.active .dot{background:linear-gradient(135deg,#6caeff,#d191ff);box-shadow:0 0 12px rgba(129,183,255,.4)}
#label{position:absolute;bottom:94px;left:50%;transform:translateX(-50%);font-size:clamp(16px,1.85vw,24px);letter-spacing:.34em;color:rgba(252,253,255,.94);text-shadow:0 0 22px rgba(112,154,255,.28),0 0 34px rgba(172,108,255,.2);white-space:nowrap}
#sub{position:absolute;bottom:66px;left:50%;transform:translateX(-50%);font-family:"Courier New",monospace;font-size:9px;letter-spacing:.22em;color:rgba(223,229,255,.56);white-space:nowrap}
#hint{position:absolute;bottom:26px;left:50%;transform:translateX(-50%);font-family:"Courier New",monospace;font-size:8px;letter-spacing:.2em;color:rgba(255,255,255,.26);white-space:nowrap}
#cursor1,#cursor2{position:fixed;pointer-events:none;z-index:12;transform:translate(-50%,-50%);border-radius:50%}
#cursor1{width:6px;height:6px;background:#fff;mix-blend-mode:screen}
#cursor2{width:22px;height:22px;border:1px solid rgba(220,228,255,.18);mix-blend-mode:screen}
@media (max-width:800px){#timeline{font-size:9px}#label{bottom:102px}#sub{bottom:74px}#hint{width:92vw;white-space:normal;line-height:1.6;text-align:center}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">T H E _ G E T A W A Y</div>
  <button id="sound">♪</button>
  <div id="timeline">
    <div class="stage active"><span class="dot"></span><span>GALAXY</span></div>
    <div class="stage"><span class="dot"></span><span>SPACE POD</span></div>
    <div class="stage"><span class="dot"></span><span>OUTSIDE HOME</span></div>
    <div class="stage"><span class="dot"></span><span>INSIDE HOME</span></div>
  </div>
  <div id="hud">
    <div>ARCHIVE : 77347 / 44271</div>
    <div>FIELD : BLUE HEART × GREEN HEART</div>
    <div id="energy" class="muted">ENERGY : 0.00</div>
    <div class="muted">MOUSE ↓ : ENTER DEEPER</div>
  </div>
  <div id="label">GALAXY</div>
  <div id="sub">blue-black seed × violet-gold drift</div>
  <div id="hint">鼠标上下移动 = 从银河进入太空舱，再进入花园与家园内部 ｜ 左右移动 = 空间视差 ｜ 左上角 = 声音</div>
</div>
<div id="cursor1"></div><div id="cursor2"></div>
<audio id="bgm" src="winter_sun.m4a" preload="auto" loop></audio>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(()=>{
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true,alpha:true});
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));renderer.setSize(window.innerWidth,window.innerHeight);renderer.setClearColor(0x050714,1);
const scene=new THREE.Scene();scene.fog=new THREE.FogExp2(0x060916,0.010);
const camera=new THREE.PerspectiveCamera(50,window.innerWidth/window.innerHeight,0.1,260);camera.position.set(0,0,12);
const root=new THREE.Group();scene.add(root);scene.add(new THREE.AmbientLight(0xffffff,0.88));
const lightA=new THREE.PointLight(0x71b4ff,1.3,90);lightA.position.set(-5,2,12);scene.add(lightA);
const lightB=new THREE.PointLight(0xc48aff,1.1,90);lightB.position.set(5,-1,10);scene.add(lightB);
const warmA=new THREE.PointLight(0xffc88d,0.0,34);warmA.position.set(-2,1,-55);scene.add(warmA);
const warmB=new THREE.PointLight(0xff9870,0.0,28);warmB.position.set(2.5,-.5,-58);scene.add(warmB);
const stageZ=[0,-20,-42,-64];
const stageMeta=[['GALAXY','blue-black seed × violet-gold drift'],['SPACE POD','glass orbit · vessel of arrival'],['OUTSIDE HOME','garden threshold · flowering gravity'],['INSIDE HOME','warm sunset room · sea-facing return']];
const state={mx:0,my:0,targetDepth:0,depth:0,energy:0,pulse:0};
const label=document.getElementById('label'),sub=document.getElementById('sub'),energyEl=document.getElementById('energy'),stageEls=[...document.querySelectorAll('.stage')];
const cursor1=document.getElementById('cursor1'),cursor2=document.getElementById('cursor2');
function moveCursor(x,y){cursor1.style.left=cursor2.style.left=x+'px';cursor1.style.top=cursor2.style.top=y+'px'}moveCursor(window.innerWidth/2,window.innerHeight/2);
window.addEventListener('mousemove',e=>{const x=e.clientX/window.innerWidth,y=e.clientY/window.innerHeight;state.mx=(x-.5)*2;state.my=-(y-.5)*2;state.targetDepth=y*3;moveCursor(e.clientX,e.clientY)});
window.addEventListener('touchmove',e=>{const t=e.touches[0],x=t.clientX/window.innerWidth,y=t.clientY/window.innerHeight;state.mx=(x-.5)*2;state.my=-(y-.5)*2;state.targetDepth=y*3;moveCursor(t.clientX,t.clientY)},{passive:true});
window.addEventListener('dblclick',()=>state.pulse=1);
function makeHeart(core,glow){const cv=document.createElement('canvas');cv.width=cv.height=256;const ctx=cv.getContext('2d');const rg=ctx.createRadialGradient(128,128,10,128,128,128);rg.addColorStop(0,core);rg.addColorStop(.25,glow);rg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=rg;ctx.beginPath();ctx.arc(128,128,120,0,Math.PI*2);ctx.fill();ctx.save();ctx.translate(128,130);ctx.scale(4.9,4.9);ctx.beginPath();ctx.moveTo(0,7);ctx.bezierCurveTo(0,7,-10,0,-10,-6);ctx.bezierCurveTo(-10,-12,-3,-15,0,-10);ctx.bezierCurveTo(3,-15,10,-12,10,-6);ctx.bezierCurveTo(10,0,0,7,0,7);ctx.closePath();ctx.fillStyle='rgba(255,255,255,1)';ctx.shadowBlur=16;ctx.shadowColor='#fff';ctx.fill();ctx.restore();const tex=new THREE.CanvasTexture(cv);const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false}));sp.scale.set(1.5,1.5,1);return sp}
const heartBlue=makeHeart('rgba(98,166,255,.96)','rgba(34,79,192,.24)'),heartGreen=makeHeart('rgba(100,255,175,.95)','rgba(18,93,52,.22)');root.add(heartBlue,heartGreen);
function makeStarField(count,spread,palette){const pos=new Float32Array(count*3),col=new Float32Array(count*3),size=new Float32Array(count);for(let i=0;i<count;i++){pos[i*3]=(Math.random()-.5)*spread.x;pos[i*3+1]=(Math.random()-.5)*spread.y;pos[i*3+2]=(Math.random()-.5)*spread.z;const c=new THREE.Color(palette[(Math.random()*palette.length)|0]);col[i*3]=c.r;col[i*3+1]=c.g;col[i*3+2]=c.b;size[i]=1.2+Math.random()*4.2}const geo=new THREE.BufferGeometry();geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('color',new THREE.BufferAttribute(col,3));geo.setAttribute('size',new THREE.BufferAttribute(size,1));const texCanvas=document.createElement('canvas');texCanvas.width=texCanvas.height=64;const ctx=texCanvas.getContext('2d');const g=ctx.createRadialGradient(32,32,0,32,32,32);g.addColorStop(0,'rgba(255,255,255,1)');g.addColorStop(.18,'rgba(255,255,255,.95)');g.addColorStop(.6,'rgba(255,255,255,.35)');g.addColorStop(1,'rgba(255,255,255,0)');ctx.fillStyle=g;ctx.fillRect(0,0,64,64);const tex=new THREE.CanvasTexture(texCanvas);const mat=new THREE.ShaderMaterial({transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,vertexColors:true,uniforms:{uTime:{value:0},uEnergy:{value:0},uTex:{value:tex}},vertexShader:`attribute float size; varying vec3 vColor; uniform float uTime; uniform float uEnergy; void main(){ vec3 p=position; p.x+=sin(uTime*.20+position.z*.04)*.18; p.y+=cos(uTime*.24+position.x*.06)*.13; vec4 mv=modelViewMatrix*vec4(p,1.0); gl_PointSize=size*(135.0/max(1.0,-mv.z))*(1.0+uEnergy*.25); gl_Position=projectionMatrix*mv; vColor=color; }`,fragmentShader:`uniform sampler2D uTex; varying vec3 vColor; void main(){ float a=texture2D(uTex, gl_PointCoord).r; if(a<.02) discard; gl_FragColor=vec4(vColor,a*.70); }`});return new THREE.Points(geo,mat)}
const galaxyDust=makeStarField(2200,{x:40,y:24,z:90},['#4f7fff','#8d65ff','#f4be76','#7fe9ff','#bb83ff']);root.add(galaxyDust);const homeDust=makeStarField(900,{x:16,y:10,z:12},['#ffd9ad','#ffb68b','#fff2dd','#f5c9a8']);homeDust.position.set(0,0,-64.5);root.add(homeDust);
const loader=new THREE.TextureLoader();
const files={galaxy:'space.jpg',pod1:'spaceship.jpg',pod2:'spaceship1.jpg',pod3:'spaceship2.webp',home1:'home1.jpg',home2:'home2.jpg',in1:'home3.jpg',in2:'home4.jpg'};
function buildCard(texture,opts={}){const img=texture.image,ratio=img.height/img.width,w=opts.width||6,h=w*ratio;const group=new THREE.Group();const plane=new THREE.Mesh(new THREE.PlaneGeometry(w,h),new THREE.MeshBasicMaterial({map:texture,transparent:true,opacity:opts.opacity??0.96,side:THREE.DoubleSide,depthWrite:false}));group.add(plane);const glow=new THREE.Mesh(new THREE.PlaneGeometry(w*1.05,h*1.05),new THREE.MeshBasicMaterial({color:new THREE.Color(opts.glow||0x8e72ff),transparent:true,opacity:opts.glowOpacity??0.06,blending:THREE.AdditiveBlending,depthWrite:false}));glow.position.z=-0.08;group.add(glow);group.userData={plane,glow};return group}
const stageRoot=new THREE.Group();root.add(stageRoot);
Promise.all(Object.values(files).map(src=>new Promise((res,rej)=>loader.load(src,t=>res([src,t]),undefined,rej)))).then(items=>{const tex=Object.fromEntries(items);const galaxyGroup=new THREE.Group();const g=buildCard(tex[files.galaxy],{width:10.0,glow:0x9375ff,glowOpacity:0.07,opacity:0.92});galaxyGroup.add(g);galaxyGroup.position.z=stageZ[0]-4;stageRoot.add(galaxyGroup);const podGroup=new THREE.Group();const p1=buildCard(tex[files.pod1],{width:6.8,glow:0x69cfff,glowOpacity:0.05});const p2=buildCard(tex[files.pod2],{width:5.8,glow:0x7893ff,glowOpacity:0.05});const p3=buildCard(tex[files.pod3],{width:5.2,glow:0x8fe2ff,glowOpacity:0.05});p1.position.set(-3.6,.55,0);p2.position.set(2.9,-1.0,-1.1);p3.position.set(.15,1.9,-2.0);podGroup.add(p1,p2,p3);podGroup.position.z=stageZ[1];stageRoot.add(podGroup);const outsideGroup=new THREE.Group();const h1=buildCard(tex[files.home1],{width:6.2,glow:0xffc7df,glowOpacity:0.045});const h2=buildCard(tex[files.home2],{width:5.9,glow:0xd7adff,glowOpacity:0.045});h1.position.set(-2.9,.65,-.35);h2.position.set(3.1,-.25,-1.25);outsideGroup.add(h1,h2);outsideGroup.position.z=stageZ[2];stageRoot.add(outsideGroup);const insideGroup=new THREE.Group();const i1=buildCard(tex[files.in1],{width:6.0,glow:0xf2d097,glowOpacity:0.05});const i2=buildCard(tex[files.in2],{width:5.8,glow:0xffa77d,glowOpacity:0.05});i1.position.set(-2.2,.2,-.2);i2.position.set(2.9,-.1,-1.15);insideGroup.add(i1,i2);insideGroup.position.z=stageZ[3];stageRoot.add(insideGroup);stageRoot.userData.groups=[galaxyGroup,podGroup,outsideGroup,insideGroup]}).catch(err=>console.error(err));
function updateUI(idx){stageEls.forEach((el,i)=>el.classList.toggle('active',i===idx));label.textContent=stageMeta[idx][0];sub.textContent=stageMeta[idx][1]}
const bgm=document.getElementById('bgm'),soundBtn=document.getElementById('sound');let soundOn=false;soundBtn.addEventListener('click',async()=>{try{if(!soundOn){await bgm.play();soundOn=true;soundBtn.classList.add('on')}else{bgm.pause();soundOn=false;soundBtn.classList.remove('on')}}catch(e){console.warn(e)}});
function resize(){renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix()}window.addEventListener('resize',resize);
let last=performance.now(),a=0,b=Math.PI;function animate(now){requestAnimationFrame(animate);const dt=Math.min(.033,(now-last)/1000);last=now;state.depth+=(state.targetDepth-state.depth)*.06;state.energy+=((((soundOn?0.18:0.08)+Math.abs(state.mx)*.05+Math.abs(state.my)*.04))-state.energy)*.06;state.pulse*=.92;const depth=THREE.MathUtils.clamp(state.depth,0,3),stageIdx=Math.round(depth);updateUI(stageIdx);const camZ=THREE.MathUtils.lerp(12,-64,depth/3);camera.position.z+=(camZ-camera.position.z)*.06;camera.position.x+=((state.mx*1.2)-camera.position.x)*.04;camera.position.y+=((state.my*.8)-camera.position.y)*.04;camera.lookAt(state.mx*.35,state.my*.22,camZ-8);root.rotation.y=state.mx*.05;root.rotation.x=-state.my*.025;a+=dt*.72;b-=dt*.64;const heartZ=THREE.MathUtils.lerp(stageZ[0],stageZ[3],depth/3)+1.7;const hs=1+state.energy*1.2+state.pulse*.35;heartBlue.position.set(Math.cos(a)*1.12+state.mx*.52,Math.sin(a*1.18)*.35+.22+state.my*.15,heartZ+Math.sin(a*1.08)*.35);heartGreen.position.set(Math.cos(b)*1.02+state.mx*.48,Math.sin(b*1.16)*.31-.18+state.my*.12,heartZ-.42+Math.sin(b*1.04)*.34);heartBlue.scale.set(1.06*hs,1.06*hs,1);heartGreen.scale.set(1.0*hs,1.0*hs,1);galaxyDust.material.uniforms.uTime.value=now*.001;galaxyDust.material.uniforms.uEnergy.value=state.energy+state.pulse*.25;galaxyDust.rotation.y+=0.00018;const insideProgress=Math.max(0,Math.min(1,(depth-2.2)/.8));homeDust.material.uniforms.uTime.value=now*.001;homeDust.material.uniforms.uEnergy.value=state.energy*.45+insideProgress*.75;homeDust.visible=insideProgress>.02;warmA.intensity=insideProgress*(1.2+state.energy*.8);warmB.intensity=insideProgress*(1.0+state.energy*.7);renderer.setClearColor(new THREE.Color(0x050714).lerp(new THREE.Color(0x251713),insideProgress*.36),1);if(stageRoot.userData.groups){stageRoot.userData.groups.forEach((group,gi)=>{group.rotation.y=Math.sin(now*.00010+gi)*.018+state.mx*.03;group.rotation.x=Math.cos(now*.00009+gi)*.012-state.my*.02;group.children.forEach((card,ci)=>{card.position.y+=Math.sin(now*.00028+gi*1.2+ci*.8)*.0012;if(card.userData){card.userData.glow.material.opacity=(gi===0?0.06:0.04)+state.energy*.015+(gi===3?insideProgress*.03:0);card.rotation.y=Math.sin(now*.00010+ci)*.01}})})}lightA.intensity=1.25+state.energy*0.8;lightB.intensity=1.05+state.energy*0.7;energyEl.textContent='ENERGY : '+(state.energy+state.pulse).toFixed(2);renderer.render(scene,camera)}animate(performance.now());
})();
</script>
</body>
</html>
