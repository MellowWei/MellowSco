<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>THE_GETAWAY</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 15%, #0b1020 0%, #05070d 45%, #010204 100%);
      color: rgba(245,248,255,.9);
      font-family: Georgia, "Times New Roman", serif;
      cursor: none;
    }
    canvas { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }
    #ui { position: fixed; inset: 0; pointer-events: none; }
    #title {
      position: absolute; top: 24px; left: 50%; transform: translateX(-50%);
      font-size: 12px; letter-spacing: .52em; white-space: nowrap;
    }
    #timeline {
      position: absolute; left: 24px; top: 72px; font: 10px "Courier New", monospace;
      letter-spacing: .18em; color: rgba(230,236,255,.68);
    }
    .stage { display: flex; gap: 10px; align-items: center; opacity: .25; transition: .35s; }
    .stage.active { opacity: 1; transform: translateX(8px); }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.22); }
    .stage.active .dot { background: linear-gradient(135deg, #6caeff, #d191ff); }
    #hud {
      position: absolute; top: 24px; right: 24px; text-align: right;
      font: 10px "Courier New", monospace; letter-spacing: .16em; line-height: 1.8;
      color: rgba(220,228,255,.72);
    }
    #label {
      position: absolute; left: 50%; bottom: 92px; transform: translateX(-50%);
      font-size: 22px; letter-spacing: .34em; white-space: nowrap;
    }
    #sub {
      position: absolute; left: 50%; bottom: 64px; transform: translateX(-50%);
      font: 9px "Courier New", monospace; letter-spacing: .22em; color: rgba(223,229,255,.54);
      white-space: nowrap;
    }
    #hint {
      position: absolute; left: 50%; bottom: 24px; transform: translateX(-50%);
      font: 8px "Courier New", monospace; letter-spacing: .2em; color: rgba(255,255,255,.24);
      white-space: nowrap;
    }
    #cursor1, #cursor2 {
      position: fixed; pointer-events: none; transform: translate(-50%, -50%); border-radius: 50%;
    }
    #cursor1 { width: 6px; height: 6px; background: white; }
    #cursor2 { width: 22px; height: 22px; border: 1px solid rgba(220,228,255,.18); }
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  <div id="ui">
    <div id="title">T H E _ G E T A W A Y</div>
    <div id="timeline">
      <div class="stage active"><span class="dot"></span><span>GALAXY</span></div>
      <div class="stage"><span class="dot"></span><span>SPACE POD</span></div>
      <div class="stage"><span class="dot"></span><span>OUTSIDE HOME</span></div>
      <div class="stage"><span class="dot"></span><span>INSIDE HOME</span></div>
    </div>
    <div id="hud">
      <div>ARCHIVE : 77347 / 44271</div>
      <div>FIELD : BLUE HEART × GREEN HEART</div>
      <div id="energy">ENERGY : 0.00</div>
    </div>
    <div id="label">GALAXY</div>
    <div id="sub">ultrafine particle field</div>
    <div id="hint">鼠标上下 = 真正进入空间 ｜ 左右 = 视差 ｜ 蓝心 / 绿心 = 引力核</div>
  </div>
  <div id="cursor1"></div>
  <div id="cursor2"></div>

  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const cursor1 = document.getElementById('cursor1');
    const cursor2 = document.getElementById('cursor2');
    const stages = [...document.querySelectorAll('.stage')];
    const label = document.getElementById('label');
    const sub = document.getElementById('sub');
    const energy = document.getElementById('energy');

    const stageDefs = [
      ['GALAXY', 'ultrafine galaxy field'],
      ['SPACE POD', 'glass orbit · vessel of arrival'],
      ['OUTSIDE HOME', 'garden threshold · flowering gravity'],
      ['INSIDE HOME', 'warm interior · sea-facing return']
    ];

    let w = 0, h = 0, dpr = 1, t = 0;
    let mx = 0.5, my = 0.5, depthTarget = 0, depth = 0;

    function resize() {
      dpr = Math.min(window.devicePixelRatio || 1, 2);
      w = innerWidth; h = innerHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function moveCursor(x, y) {
      cursor1.style.left = cursor2.style.left = x + 'px';
      cursor1.style.top = cursor2.style.top = y + 'px';
    }

    const galaxy = Array.from({ length: 2600 }, () => ({
      a: Math.random() * Math.PI * 2,
      r: Math.pow(Math.random(), 0.62) * Math.min(innerWidth, innerHeight) * 0.42,
      s: Math.random() * 0.7 + 0.1,
      z: Math.random() * 1200,
      c: ['#6aa9ff', '#8967ff', '#f3c06c', '#83eeff'][Math.floor(Math.random() * 4)]
    }));

    const field = Array.from({ length: 1800 }, () => ({
      x: (Math.random() - .5) * 2200,
      y: (Math.random() - .5) * 1200,
      z: Math.random() * 2200,
      s: Math.random() * .55 + .08,
      c: ['#6aa9ff', '#8967ff', '#f3c06c', '#83eeff'][Math.floor(Math.random() * 4)]
    }));

    const clouds = [
      { stage: 1, x: -220, y: 40, z: 0, color: 'rgba(110,210,255,0.08)' },
      { stage: 1, x: 230, y: -70, z: -120, color: 'rgba(130,160,255,0.08)' },
      { stage: 2, x: -250, y: 30, z: 0, color: 'rgba(255,200,220,0.06)' },
      { stage: 2, x: 255, y: -15, z: -110, color: 'rgba(220,170,255,0.06)' },
      { stage: 3, x: -220, y: 0, z: 0, color: 'rgba(255,220,170,0.07)' },
      { stage: 3, x: 235, y: -8, z: -100, color: 'rgba(255,170,120,0.07)' }
    ];

    function project(x, y, z, camZ) {
      const f = 1150 / Math.max(240, (z - camZ) + 1150);
      return { x: w / 2 + x * f, y: h / 2 + y * f, s: f };
    }

    function setStage(i) {
      stages.forEach((el, idx) => el.classList.toggle('active', idx === i));
      label.textContent = stageDefs[i][0];
      sub.textContent = stageDefs[i][1];
    }

    function drawGlow(x, y, r, color) {
      const g = ctx.createRadialGradient(x, y, 0, x, y, r);
      g.addColorStop(0, color);
      g.addColorStop(1, color.replace(/[^,]+\)$/,'0)'));
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function render() {
      t += 0.005;
      depth += (depthTarget - depth) * 0.08;
      const stage = Math.round(Math.max(0, Math.min(3, depth)));
      setStage(stage);
      const camZ = depth * 520;
      const parX = (mx - 0.5) * 180;
      const parY = (my - 0.5) * 120;

      ctx.clearRect(0, 0, w, h);
      const bg = ctx.createLinearGradient(0, 0, 0, h);
      bg.addColorStop(0, '#02030a');
      bg.addColorStop(1, depth > 2.3 ? '#20140f' : '#0a0d18');
      ctx.fillStyle = bg;
      ctx.fillRect(0, 0, w, h);

      for (const p of field) {
        const q = project(p.x + parX * 0.12, p.y + parY * 0.12, p.z, camZ * 0.35);
        ctx.globalAlpha = 0.05 + q.s * 0.12;
        ctx.fillStyle = p.c;
        ctx.beginPath();
        ctx.arc(q.x, q.y, p.s * Math.max(0.16, q.s), 0, Math.PI * 2);
        ctx.fill();
      }

      const gx = w * 0.5 + parX * 0.15;
      const gy = h * 0.42 + parY * 0.12;
      for (const p of galaxy) {
        const arm = p.a + Math.log(1 + p.r * 0.02) * 2.2 + t * 0.22;
        const x = gx + Math.cos(arm) * p.r;
        const y = gy + Math.sin(arm) * p.r * 0.48;
        ctx.globalAlpha = 0.04 + (1 - p.r / (Math.min(w,h)*0.42)) * 0.18;
        ctx.fillStyle = p.c;
        ctx.beginPath();
        ctx.arc(x, y, p.s, 0, Math.PI * 2);
        ctx.fill();
      }

      const blue = project(Math.cos(t * 1.1) * 120 + parX * 0.1, Math.sin(t * 1.3) * 34 + 20 + parY * 0.08, depth * 420, camZ);
      const green = project(Math.cos(-t * 1.0) * 110 + parX * 0.08, Math.sin(-t * 1.2) * 28 - 16 + parY * 0.06, depth * 420 - 24, camZ);
      drawGlow(blue.x, blue.y, 20 * blue.s, 'rgba(100,166,255,0.42)');
      drawGlow(green.x, green.y, 18 * green.s, 'rgba(100,255,175,0.40)');

      for (const c of clouds) {
        const d = c.stage - depth;
        const vis = Math.max(0, 1 - Math.abs(d) * 1.05);
        if (vis < 0.02) continue;
        const p = project(c.x + parX * 0.14, c.y + parY * 0.10, c.stage * 520 + c.z + d * 340, camZ);
        ctx.globalAlpha = vis * 0.9;
        const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 180 * p.s);
        g.addColorStop(0, c.color);
        g.addColorStop(1, c.color.replace(/[^,]+\)$/,'0)'));
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 180 * p.s, 0, Math.PI * 2);
        ctx.fill();
      }

      energy.textContent = 'ENERGY : ' + (Math.abs(depthTarget - depth) + 0.15).toFixed(2);
      requestAnimationFrame(render);
    }

    window.addEventListener('mousemove', (e) => {
      mx = e.clientX / w;
      my = e.clientY / h;
      depthTarget = my * 3;
      moveCursor(e.clientX, e.clientY);
    });

    window.addEventListener('resize', resize);
    resize();
    render();
  })();
</script>
</body>
</html>
