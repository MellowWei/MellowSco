<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>THE_GETAWAY</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%;height:100%;overflow:hidden;cursor:none;
    background:
      radial-gradient(circle at 50% 12%, rgba(255,220,150,.06), transparent 18%),
      radial-gradient(circle at 18% 16%, rgba(85,130,255,.08), transparent 28%),
      radial-gradient(circle at 82% 20%, rgba(175,100,255,.08), transparent 24%),
      linear-gradient(180deg,#02030a 0%,#060913 50%,#0a0d18 100%);
    color:#fff;font-family:"Hiragino Mincho ProN","Times New Roman",serif;
  }
  canvas{position:fixed;inset:0;display:block}
  #ui{position:fixed;inset:0;pointer-events:none;z-index:5}
  #title{
    position:absolute;top:24px;left:50%;transform:translateX(-50%);
    font-size:clamp(11px,1.1vw,14px);letter-spacing:.48em;color:rgba(242,246,255,.82);
    text-shadow:0 0 22px rgba(104,149,255,.28),0 0 34px rgba(170,108,255,.16);white-space:nowrap;
  }
  #sound{
    position:absolute;top:22px;left:24px;width:30px;height:30px;border-radius:999px;
    border:1px solid rgba(208,220,255,.18);background:rgba(255,255,255,.03);
    color:rgba(255,255,255,.76);display:grid;place-items:center;pointer-events:auto;font-size:12px;
  }
  #sound.on{border-color:rgba(154,190,255,.45);box-shadow:0 0 18px rgba(106,169,255,.18)}
  #hud{
    position:absolute;top:24px;right:24px;text-align:right;
    font-family:"Courier New",monospace;font-size:10px;letter-spacing:.16em;line-height:1.85;color:rgba(220,228,255,.78)
  }
  #hud .muted{color:rgba(180,192,255,.52)}
  #timeline{
    position:absolute;left:24px;top:72px;font-family:"Courier New",monospace;
    font-size:10px;letter-spacing:.18em;color:rgba(230,236,255,.74)
  }
  .stage{display:flex;gap:10px;align-items:center;opacity:.26;transform:translateX(0);transition:.35s}
  .stage.active{opacity:1;transform:translateX(8px);text-shadow:0 0 16px rgba(176,140,255,.24)}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(220,232,255,.22)}
  .stage.active .dot{background:linear-gradient(135deg,#6caeff,#d191ff);box-shadow:0 0 12px rgba(129,183,255,.4)}
  #label{
    position:absolute;bottom:92px;left:50%;transform:translateX(-50%);
    font-size:clamp(16px,1.85vw,24px);letter-spacing:.34em;color:rgba(252,253,255,.94);
    text-shadow:0 0 22px rgba(112,154,255,.22),0 0 34px rgba(172,108,255,.14);white-space:nowrap;
  }
  #sub{
    position:absolute;bottom:64px;left:50%;transform:translateX(-50%);
    font-family:"Courier New",monospace;font-size:9px;letter-spacing:.22em;color:rgba(223,229,255,.56);white-space:nowrap;
  }
  #hint{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    font-family:"Courier New",monospace;font-size:8px;letter-spacing:.2em;color:rgba(255,255,255,.26);white-space:nowrap;
  }
  #cursor1,#cursor2{position:fixed;pointer-events:none;z-index:10;transform:translate(-50%,-50%);border-radius:50%}
  #cursor1{width:6px;height:6px;background:#fff}
  #cursor2{width:22px;height:22px;border:1px solid rgba(220,228,255,.18)}
  @media (max-width:800px){
    #timeline{font-size:9px}
    #label{bottom:102px}
    #sub{bottom:74px}
    #hint{width:92vw;white-space:normal;line-height:1.6;text-align:center}
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="title">T H E _ G E T A W A Y</div>
  <button id="sound">♪</button>
  <div id="timeline">
    <div class="stage active"><span class="dot"></span><span>GALAXY</span></div>
    <div class="stage"><span class="dot"></span><span>SPACE POD</span></div>
    <div class="stage"><span class="dot"></span><span>OUTSIDE HOME</span></div>
    <div class="stage"><span class="dot"></span><span>INSIDE HOME</span></div>
  </div>
  <div id="hud">
    <div>ARCHIVE : 77347 / 44271</div>
    <div>FIELD : BLUE HEART × GREEN HEART</div>
    <div id="energy" class="muted">ENERGY : 0.00</div>
    <div class="muted">MOUSE ↓ : ENTER DEEPER</div>
  </div>
  <div id="label">GALAXY</div>
  <div id="sub">multi-dimensional particle bodies</div>
  <div id="hint">鼠标上下移动会明显进入不同空间 ｜ 左右移动 = 多维视差 ｜ 纯粒子图像体</div>
</div>
<div id="cursor1"></div><div id="cursor2"></div>
<audio id="bgm" src="winter_sun.m4a" preload="auto" loop></audio>

<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  const state = { w: innerWidth, h: innerHeight, mx: 0, my: 0, targetDepth: 0, depth: 0, energy: 0, pulse: 0, soundOn: false };
  const stageDefs = [
    { name: 'GALAXY', sub: 'blue-black seed × violet-gold drift' },
    { name: 'SPACE POD', sub: 'glass orbit · vessel of arrival' },
    { name: 'OUTSIDE HOME', sub: 'garden threshold · flowering gravity' },
    { name: 'INSIDE HOME', sub: 'warm sunset room · sea-facing return' },
  ];
  const stageEls = [...document.querySelectorAll('.stage')];
  const labelEl = document.getElementById('label');
  const subEl = document.getElementById('sub');
  const energyEl = document.getElementById('energy');

  const cursor1 = document.getElementById('cursor1');
  const cursor2 = document.getElementById('cursor2');
  function moveCursor(x, y) {
    cursor1.style.left = cursor2.style.left = x + 'px';
    cursor1.style.top = cursor2.style.top = y + 'px';
  }
  moveCursor(innerWidth / 2, innerHeight / 2);

  function resize() {
    state.w = innerWidth;
    state.h = innerHeight;
    canvas.width = Math.round(state.w * DPR);
    canvas.height = Math.round(state.h * DPR);
    canvas.style.width = state.w + 'px';
    canvas.style.height = state.h + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  addEventListener('resize', resize);

  addEventListener('mousemove', (e) => {
    const x = e.clientX / state.w;
    const y = e.clientY / state.h;
    state.mx = (x - 0.5) * 2;
    state.my = -(y - 0.5) * 2;
    state.targetDepth = y * 3;
    moveCursor(e.clientX, e.clientY);
  });

  addEventListener('touchmove', (e) => {
    const t = e.touches[0];
    const x = t.clientX / state.w;
    const y = t.clientY / state.h;
    state.mx = (x - 0.5) * 2;
    state.my = -(y - 0.5) * 2;
    state.targetDepth = y * 3;
    moveCursor(t.clientX, t.clientY);
  }, { passive: true });

  addEventListener('dblclick', () => state.pulse = 1);

  const bgm = document.getElementById('bgm');
  const soundBtn = document.getElementById('sound');
  soundBtn.addEventListener('click', async () => {
    try {
      if (!state.soundOn) {
        await bgm.play();
        state.soundOn = true;
        soundBtn.classList.add('on');
      } else {
        bgm.pause();
        state.soundOn = false;
        soundBtn.classList.remove('on');
      }
    } catch (e) {
      console.warn(e);
    }
  });

  function updateUI(i) {
    stageEls.forEach((el, idx) => el.classList.toggle('active', idx === i));
    labelEl.textContent = stageDefs[i].name;
    subEl.textContent = stageDefs[i].sub;
  }

  const hiddenCanvas = document.createElement('canvas');
  const hctx = hiddenCanvas.getContext('2d', { willReadFrequently: true });

  function loadImage(src) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = src;
    });
  }

  function sampleLayers(img, options) {
    const sample = options.sample || 6;
    const width = options.width || 400;
    const depth = options.depth || 36;
    const ratio = img.height / img.width;
    const height = width * ratio;

    hiddenCanvas.width = img.width;
    hiddenCanvas.height = img.height;
    hctx.clearRect(0, 0, img.width, img.height);
    hctx.drawImage(img, 0, 0);
    const data = hctx.getImageData(0, 0, img.width, img.height).data;

    const back = [], mid = [], front = [];
    for (let y = 0; y < img.height; y += sample) {
      for (let x = 0; x < img.width; x += sample) {
        const i = (y * img.width + x) * 4;
        const a = data[i + 3] / 255;
        if (a < 0.15) continue;
        const r = data[i] / 255, g = data[i + 1] / 255, b = data[i + 2] / 255;
        const lum = (r + g + b) / 3;
        if (lum < 0.04) continue;
        const roll = Math.random();
        if (roll > 0.35 + lum * 0.55) continue;

        const edgeX = Math.abs(x / img.width - 0.5) * 2;
        const edgeY = Math.abs(y / img.height - 0.5) * 2;
        const edge = Math.max(edgeX, edgeY);
        const zBase = (0.55 - edge * 0.35 + lum * 0.6);
        const p = {
          x: (x / img.width - 0.5) * width,
          y: -(y / img.height - 0.5) * height,
          z: (Math.random() - 0.5) * depth * zBase,
          r, g, b,
          a: 0.82 + lum * 0.12,
          size: 0.55 + lum * 1.35 + Math.random() * 0.28,
          seed: Math.random() * Math.PI * 2
        };
        if (lum > 0.68) front.push(p);
        else if (lum > 0.38) mid.push(p);
        else back.push(p);
      }
    }
    return { width, height, back, mid, front };
  }

  const groups = [];
  const imageFiles = {
    galaxy: 'space.jpg',
    pod1: 'spaceship.jpg',
    pod2: 'spaceship1.jpg',
    pod3: 'spaceship2.webp',
    home1: 'home1.jpg',
    home2: 'home2.jpg',
    in1: 'home3.jpg',
    in2: 'home4.jpg'
  };

  Promise.all([
    loadImage(imageFiles.galaxy),
    loadImage(imageFiles.pod1),
    loadImage(imageFiles.pod2),
    loadImage(imageFiles.pod3),
    loadImage(imageFiles.home1),
    loadImage(imageFiles.home2),
    loadImage(imageFiles.in1),
    loadImage(imageFiles.in2),
  ]).then(([galaxy, pod1, pod2, pod3, home1, home2, in1, in2]) => {
    groups.push({ stage: 0, x: 0, y: 0, z: 0, aura: 'rgba(151,117,255,0.10)', layers: sampleLayers(galaxy, { sample: 5, width: 760, depth: 58 }) });

    groups.push({ stage: 1, x: -245, y: 30, z: 0, aura: 'rgba(105,207,255,0.08)', layers: sampleLayers(pod1, { sample: 6, width: 420, depth: 30 }) });
    groups.push({ stage: 1, x: 250, y: -95, z: -120, aura: 'rgba(120,147,255,0.08)', layers: sampleLayers(pod2, { sample: 6, width: 350, depth: 28 }) });
    groups.push({ stage: 1, x: 0, y: 185, z: -200, aura: 'rgba(143,226,255,0.08)', layers: sampleLayers(pod3, { sample: 7, width: 300, depth: 24 }) });

    groups.push({ stage: 2, x: -250, y: 40, z: 0, aura: 'rgba(255,199,223,0.07)', layers: sampleLayers(home1, { sample: 6, width: 380, depth: 22 }) });
    groups.push({ stage: 2, x: 255, y: -20, z: -110, aura: 'rgba(215,173,255,0.07)', layers: sampleLayers(home2, { sample: 6, width: 350, depth: 20 }) });

    groups.push({ stage: 3, x: -210, y: 0, z: 0, aura: 'rgba(242,208,151,0.08)', layers: sampleLayers(in1, { sample: 6, width: 360, depth: 18 }) });
    groups.push({ stage: 3, x: 225, y: -8, z: -95, aura: 'rgba(255,167,125,0.08)', layers: sampleLayers(in2, { sample: 6, width: 338, depth: 18 }) });
  }).catch(err => console.error(err));

  const stars = Array.from({ length: 1900 }, () => ({
    x: (Math.random() - 0.5) * 2600,
    y: (Math.random() - 0.5) * 1500,
    z: Math.random() * 2800,
    c: ['#4f7fff', '#8d65ff', '#f4be76', '#7fe9ff', '#bb83ff'][Math.floor(Math.random() * 5)],
    s: 0.3 + Math.random() * 1.55
  }));

  const homeDust = Array.from({ length: 520 }, () => ({
    x: (Math.random() - 0.5) * 760,
    y: (Math.random() - 0.5) * 440,
    z: Math.random() * 360,
    c: ['#ffd9ad', '#ffb68b', '#fff2dd', '#f5c9a8'][Math.floor(Math.random() * 4)],
    s: 0.55 + Math.random() * 2.2
  }));

  function project(x, y, z, camZ) {
    const dz = z - camZ;
    const f = 1000 / Math.max(220, dz + 1000);
    return { x: state.w / 2 + x * f, y: state.h / 2 + y * f, s: f };
  }

  function glow(x, y, r, rgba) {
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, rgba.replace('ALPHA', '1'));
    g.addColorStop(1, rgba.replace('ALPHA', '0'));
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawLayer(layer, gx, gy, gz, camZ, vis, strength) {
    for (const p of layer) {
      const px = gx + p.x + Math.sin(time * 0.75 + p.seed) * (1.2 + strength * 2.8);
      const py = gy + p.y + Math.cos(time * 0.62 + p.seed * 1.7) * (1.2 + strength * 2.4);
      const pz = gz + p.z + Math.sin(time * 0.84 + p.seed) * (1.8 + strength * 5.4);
      const pr = project(px, py, pz, camZ);
      if (pr.x < -20 || pr.x > state.w + 20 || pr.y < -20 || pr.y > state.h + 20) continue;
      const r = p.size * pr.s;
      ctx.globalAlpha = p.a * vis;
      ctx.fillStyle = `rgba(${Math.round(p.r*255)},${Math.round(p.g*255)},${Math.round(p.b*255)},1)`;
      ctx.beginPath();
      ctx.arc(pr.x, pr.y, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  let time = 0;
  function render() {
    requestAnimationFrame(render);
    time += 0.016;

    state.depth += (state.targetDepth - state.depth) * 0.08;
    state.energy += ((((state.soundOn ? 0.18 : 0.08) + Math.abs(state.mx) * 0.05 + Math.abs(state.my) * 0.04)) - state.energy) * 0.06;
    state.pulse *= 0.92;

    const depth = Math.max(0, Math.min(3, state.depth));
    const stageIdx = Math.round(depth);
    updateUI(stageIdx);
    const insideProgress = Math.max(0, Math.min(1, (depth - 2.2) / 0.8));

    const bg = ctx.createLinearGradient(0, 0, 0, state.h);
    bg.addColorStop(0, '#02030a');
    bg.addColorStop(0.55, '#070a14');
    bg.addColorStop(1, insideProgress > 0 ? '#221611' : '#0b0f1b');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, state.w, state.h);

    const camZ = depth * 520; // stronger actual movement
    const parX = state.mx * 86;
    const parY = -state.my * 48;

    for (const s of stars) {
      const p = project(s.x + parX * 0.16, s.y + parY * 0.16, s.z, camZ * 0.3);
      if (p.x < -20 || p.x > state.w + 20 || p.y < -20 || p.y > state.h + 20) continue;
      ctx.globalAlpha = 0.07 + p.s * 0.22;
      ctx.fillStyle = s.c;
      ctx.beginPath();
      ctx.arc(p.x, p.y, s.s * p.s, 0, Math.PI * 2);
      ctx.fill();
    }

    const heartBaseZ = depth * 430;
    const hb = project(Math.cos(time * 0.72) * 128 + parX * 0.10, Math.sin(time * 0.86) * 40 + 26 + parY * 0.08, heartBaseZ + Math.sin(time) * 26, camZ);
    const hg = project(Math.cos(time * -0.64) * 118 + parX * 0.08, Math.sin(time * -0.78) * 36 - 22 + parY * 0.07, heartBaseZ - 38 + Math.sin(time * 0.9) * 22, camZ);
    glow(hb.x, hb.y, 34 * hb.s * (1 + state.energy), 'rgba(98,166,255,ALPHA)');
    glow(hg.x, hg.y, 30 * hg.s * (1 + state.energy), 'rgba(100,255,175,ALPHA)');

    for (const group of groups) {
      const d = group.stage - depth;
      const vis = Math.max(0, 1 - Math.abs(d) * 1.1);
      if (vis < 0.015) continue;

      const gz = group.stage * 520 + group.z + d * 320; // enter/exit space strongly
      const gx = group.x + parX * (0.15 + group.stage * 0.02);
      const gy = group.y + parY * (0.12 + group.stage * 0.02);

      const auraP = project(gx, gy, gz - 20, camZ);
      ctx.globalAlpha = 0.42 * vis;
      ctx.fillStyle = group.aura;
      ctx.beginPath();
      ctx.ellipse(auraP.x, auraP.y, group.layers.width * 0.46 * auraP.s, group.layers.height * 0.46 * auraP.s, 0, 0, Math.PI * 2);
      ctx.fill();

      drawLayer(group.layers.back, gx, gy, gz - 18, camZ, vis * 0.65, state.energy);
      drawLayer(group.layers.mid, gx, gy, gz, camZ, vis * 0.88, state.energy);
      drawLayer(group.layers.front, gx, gy, gz + 18, camZ, vis, state.energy + state.pulse * 0.5);
    }

    if (insideProgress > 0.02) {
      for (const d of homeDust) {
        const p = project(d.x + parX * 0.08, d.y + parY * 0.08, 1560 + d.z, camZ);
        if (p.x < -10 || p.x > state.w + 10 || p.y < -10 || p.y > state.h + 10) continue;
        ctx.globalAlpha = insideProgress * 0.20;
        ctx.fillStyle = d.c;
        ctx.beginPath();
        ctx.arc(p.x, p.y, d.s * p.s, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.globalAlpha = 1;
    energyEl.textContent = 'ENERGY : ' + (state.energy + state.pulse).toFixed(2);
  }

  render();
})();
</script>
</body>
</html>
